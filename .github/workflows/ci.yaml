name: Configuration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  DEVCONTAINER_BUILD_CACHE_DIR: .buildx-cache
  DEVCONTAINER_IMAGE: state-mate:${{ github.sha }}

jobs:
  test:
    name: Test ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lido V3 configs - Mainnet
          - config: configs/lidov3/mainnet/lidov3-core.yaml
            network: ethereum-mainnet
          - config: configs/lidov3/mainnet/lidov3-et.yml
            network: ethereum-mainnet
          # SafeHarbor configs
          - config: configs/safeharbor/mainnet.yml
            network: ethereum-mainnet
          # Lido V3 configs - Hoodi
          - config: configs/lidov3/hoodi/lidov3-testnet.yaml
            network: hoodi-testnet
          # Mellow stRATEGY configs - Mainnet
          - config: configs/mellow_strategy/mellow-strategy.yml
            network: ethereum-mainnet
          # DeFiWrapper configs
          - config: configs/defiwrapper/mainnet.seed.generated.yml
            network: ethereum-mainnet
          # Meta configs - Ethereum
          - config: configs/meta/ethereum/mellow-earneth-vaults.yml
            network: ethereum-mainnet
          - config: configs/meta/ethereum/mellow-earnusd-vaults.yml
            network: ethereum-mainnet

    env:
      # Explorer API tokens
      ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}

      # Ethereum RPC URLs
      MAINNET_REMOTE_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      HOODI_REMOTE_RPC_URL: ${{ secrets.HOODI_REMOTE_RPC_URL }}
      L1_MAINNET_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore devcontainer build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEVCONTAINER_BUILD_CACHE_DIR }}
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/Dockerfile', '.dockerignore') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-

      - name: Build devcontainer image
        run: |
          mkdir -p "${DEVCONTAINER_BUILD_CACHE_DIR}"
          docker buildx create --use --name state-mate-builder
          docker buildx inspect --bootstrap
          docker buildx build \
            --cache-from "type=local,src=${DEVCONTAINER_BUILD_CACHE_DIR}" \
            --cache-to "type=local,dest=${DEVCONTAINER_BUILD_CACHE_DIR}-new,mode=max" \
            --file .devcontainer/Dockerfile \
            --load \
            --tag "${DEVCONTAINER_IMAGE}" \
            .
          rm -rf "${DEVCONTAINER_BUILD_CACHE_DIR}"
          mv "${DEVCONTAINER_BUILD_CACHE_DIR}-new" "${DEVCONTAINER_BUILD_CACHE_DIR}"

      - name: Run state-mate
        env:
          STATE_MATE_CONFIG: ${{ matrix.config }}
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${GITHUB_WORKSPACE}:/workspaces/state-mate" \
            --workdir /workspaces/state-mate \
            --env CI=true \
            --env HUSKY=0 \
            --env HOME=/tmp/state-mate-home \
            --env XDG_CACHE_HOME=/tmp/state-mate-home/.cache \
            --env COREPACK_HOME=/tmp/state-mate-home/.cache/corepack \
            --env YARN_CACHE_FOLDER=/tmp/state-mate-home/.cache/yarn \
            --env ETHERSCAN_TOKEN \
            --env MAINNET_REMOTE_RPC_URL \
            --env HOODI_REMOTE_RPC_URL \
            --env L1_MAINNET_RPC_URL \
            --env STATE_MATE_CONFIG \
            "${DEVCONTAINER_IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p "$HOME" "$XDG_CACHE_HOME" "$COREPACK_HOME" "$YARN_CACHE_FOLDER"
              yarn install --immutable
              yarn start "$STATE_MATE_CONFIG"
            '

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore devcontainer build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEVCONTAINER_BUILD_CACHE_DIR }}
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/Dockerfile', '.dockerignore') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-

      - name: Build devcontainer image
        run: |
          mkdir -p "${DEVCONTAINER_BUILD_CACHE_DIR}"
          docker buildx create --use --name state-mate-builder
          docker buildx inspect --bootstrap
          docker buildx build \
            --cache-from "type=local,src=${DEVCONTAINER_BUILD_CACHE_DIR}" \
            --cache-to "type=local,dest=${DEVCONTAINER_BUILD_CACHE_DIR}-new,mode=max" \
            --file .devcontainer/Dockerfile \
            --load \
            --tag "${DEVCONTAINER_IMAGE}" \
            .
          rm -rf "${DEVCONTAINER_BUILD_CACHE_DIR}"
          mv "${DEVCONTAINER_BUILD_CACHE_DIR}-new" "${DEVCONTAINER_BUILD_CACHE_DIR}"

      - name: Run lint and format checks
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${GITHUB_WORKSPACE}:/workspaces/state-mate" \
            --workdir /workspaces/state-mate \
            --env CI=true \
            --env HUSKY=0 \
            --env HOME=/tmp/state-mate-home \
            --env XDG_CACHE_HOME=/tmp/state-mate-home/.cache \
            --env COREPACK_HOME=/tmp/state-mate-home/.cache/corepack \
            --env YARN_CACHE_FOLDER=/tmp/state-mate-home/.cache/yarn \
            "${DEVCONTAINER_IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p "$HOME" "$XDG_CACHE_HOME" "$COREPACK_HOME" "$YARN_CACHE_FOLDER"
              yarn install --immutable
              yarn lint
              yarn format
            '

  schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore devcontainer build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEVCONTAINER_BUILD_CACHE_DIR }}
          key: devcontainer-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/Dockerfile', '.dockerignore') }}
          restore-keys: |
            devcontainer-buildx-${{ runner.os }}-

      - name: Build devcontainer image
        run: |
          mkdir -p "${DEVCONTAINER_BUILD_CACHE_DIR}"
          docker buildx create --use --name state-mate-builder
          docker buildx inspect --bootstrap
          docker buildx build \
            --cache-from "type=local,src=${DEVCONTAINER_BUILD_CACHE_DIR}" \
            --cache-to "type=local,dest=${DEVCONTAINER_BUILD_CACHE_DIR}-new,mode=max" \
            --file .devcontainer/Dockerfile \
            --load \
            --tag "${DEVCONTAINER_IMAGE}" \
            .
          rm -rf "${DEVCONTAINER_BUILD_CACHE_DIR}"
          mv "${DEVCONTAINER_BUILD_CACHE_DIR}-new" "${DEVCONTAINER_BUILD_CACHE_DIR}"

      - name: Validate schemas
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${GITHUB_WORKSPACE}:/workspaces/state-mate" \
            --workdir /workspaces/state-mate \
            --env CI=true \
            --env HUSKY=0 \
            --env HOME=/tmp/state-mate-home \
            --env XDG_CACHE_HOME=/tmp/state-mate-home/.cache \
            --env COREPACK_HOME=/tmp/state-mate-home/.cache/corepack \
            --env YARN_CACHE_FOLDER=/tmp/state-mate-home/.cache/yarn \
            "${DEVCONTAINER_IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p "$HOME" "$XDG_CACHE_HOME" "$COREPACK_HOME" "$YARN_CACHE_FOLDER"
              yarn install --immutable
              yarn schemas
              if ! git diff --exit-code schemas/; then
                echo "Error: Schema files are not up to date. Please run '\''yarn schemas'\'' and commit the changes."
                exit 1
              fi
            '
