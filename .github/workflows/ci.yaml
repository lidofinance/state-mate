name: Configuration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lido V3 configs - Mainnet
          - config: configs/lidov3/mainnet/lidov3-core.yaml
            network: ethereum-mainnet
          - config: configs/lidov3/mainnet/lidov3-et.yml
            network: ethereum-mainnet
          # SafeHarbor configs
          - config: configs/safeharbor/mainnet.yml
            network: ethereum-mainnet
          # Lido V3 configs - Hoodi
          - config: configs/lidov3/hoodi/lidov3-testnet.yaml
            network: hoodi-testnet
          # Mellow stRATEGY configs - Mainnet
          - config: configs/mellow_strategy/mellow-strategy.yml
            network: ethereum-mainnet
          # DeFiWrapper configs
          - config: configs/defiwrapper/mainnet.seed.generated.yml
            network: ethereum-mainnet
          # Meta configs - Ethereum
          - config: configs/meta/ethereum/mellow-earneth-vaults.yml
            network: ethereum-mainnet
          - config: configs/meta/ethereum/mellow-earnusd-vaults.yml
            network: ethereum-mainnet

    env:
      # Explorer API tokens
      ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}

      # Ethereum RPC URLs
      MAINNET_REMOTE_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      HOODI_REMOTE_RPC_URL: ${{ secrets.HOODI_REMOTE_RPC_URL }}
      L1_MAINNET_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Run state-mate
        run: yarn start ${{ matrix.config }}

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format

  schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Generate schemas
        run: yarn schemas

      - name: Check if schemas are up to date
        run: |
          if ! git diff --exit-code schemas/; then
            echo "Error: Schema files are not up to date. Please run 'yarn schemas' and commit the changes."
            exit 1
          fi
