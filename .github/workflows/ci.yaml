name: Configuration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lido configs - Mainnet
          - config: configs/lido/mainnet/lido.yaml
            network: ethereum-mainnet
          - config: configs/lido/mainnet/lido-et.yaml
            network: ethereum-mainnet
          # Lido configs - Hoodi
          - config: configs/lido/hoodi/lido-testnet.yaml
            network: hoodi-testnet
          - config: configs/lido/hoodi/lido-et-testnet.yaml
            network: hoodi-testnet
          # SafeHarbor configs
          - config: configs/safeharbor/mainnet.yaml
            network: ethereum-mainnet
          # Mellow stRATEGY configs - Mainnet
          - config: configs/mellow_strategy/mellow-strategy.yaml
            network: ethereum-mainnet
          # DeFiWrapper configs
          - config: configs/defiwrapper/mainnet.seed.generated.yaml
            network: ethereum-mainnet
          # Earn configs - Mainnet
          - config: configs/earn/atoken-wsteth-swap.yaml
            network: ethereum-mainnet
          # Meta configs - Ethereum
          - config: configs/meta/ethereum/mellow-earneth-vaults.yaml
            network: ethereum-mainnet
          - config: configs/meta/ethereum/mellow-earnusd-vaults.yaml
            network: ethereum-mainnet
          # Meta configs - L2s
          - config: configs/meta/base/mellow-earnusd-vaults.yaml
            network: base-mainnet
          - config: configs/meta/arbitrum/mellow-earnusd-vaults.yaml
            network: arbitrum-mainnet
          - config: configs/meta/mantle/mellow-earnusd-vaults.yaml
            network: mantle-mainnet
          - config: configs/meta/plasma/mellow-earnusd-vaults.yaml
            network: plasma-mainnet

    env:
      # Explorer API tokens
      ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}

      # Ethereum + L2 RPC URLs
      MAINNET_REMOTE_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      HOODI_REMOTE_RPC_URL: ${{ secrets.HOODI_REMOTE_RPC_URL }}
      L1_MAINNET_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
      MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
      PLASMA_RPC_URL: ${{ secrets.PLASMA_RPC_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Run state-mate
        run: yarn start ${{ matrix.config }}

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format

  schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Generate schemas
        run: yarn schemas

      - name: Check if schemas are up to date
        run: |
          if ! git diff --exit-code schemas/; then
            echo "Error: Schema files are not up to date. Please run 'yarn schemas' and commit the changes."
            exit 1
          fi
