name: Configuration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: configs/lido/mainnet
          - config: configs/lido/testnet
          - config: configs/lido-earn/mainnet
          - config: configs/lido-multichain/mainnet
          - config: configs/lido-multichain/testnet
          - config: configs/mellow/mainnet
          - config: configs/defiwrapper/mainnet

    # Real env vars take precedence over .env values. Map only secrets that
    # actually exist: an empty mapping would shadow the .env.sample default.
    env:
      ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}
      ETH_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      ETH_HOODI_RPC_URL: ${{ secrets.HOODI_REMOTE_RPC_URL }}
      ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
      MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
      PLASMA_RPC_URL: ${{ secrets.PLASMA_RPC_URL }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      - name: Prepare .env
        run: cp .env.sample .env

      - name: Run state-mate
        run: yarn start ${{ matrix.config }} --quiet

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test:coverage

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format

  schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      - name: Generate schemas
        run: yarn schemas

      - name: Check if schemas are up to date
        run: |
          if ! git diff --exit-code schemas/; then
            echo "Error: Schema files are not up to date. Please run 'yarn schemas' and commit the changes."
            exit 1
          fi
