name: Configuration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lido configs - Mainnet
          - config: configs/lido/mainnet/lido.yaml
            network: ethereum-mainnet
          - config: configs/lido/mainnet/lido-et.yml
            network: ethereum-mainnet
          # Lido V3 configs - Hoodi
          - config: configs/lido/hoodi/lido-testnet.yaml
            network: hoodi-testnet
          - config: configs/lido/hoodi/lido-et-testnet.yaml
            network: hoodi-testnet
          # SafeHarbor configs
          - config: configs/safeharbor/mainnet.yml
            network: ethereum-mainnet
          # Mellow stRATEGY configs - Mainnet
          - config: configs/mellow_strategy/mellow-strategy.yml
            network: ethereum-mainnet
          # DeFiWrapper configs
          - config: configs/defiwrapper/mainnet.seed.generated.yml
            network: ethereum-mainnet
          # Meta configs - Ethereum
          - config: configs/meta/ethereum/mellow-earneth-vaults.yml
            network: ethereum-mainnet
          - config: configs/meta/ethereum/mellow-earnusd-vaults.yml
            network: ethereum-mainnet

    env:
      # Explorer API tokens
      ETHERSCAN_TOKEN: ${{ secrets.ETHERSCAN_TOKEN }}

      # Ethereum RPC URLs
      MAINNET_REMOTE_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}
      HOODI_REMOTE_RPC_URL: ${{ secrets.HOODI_REMOTE_RPC_URL }}
      L1_MAINNET_RPC_URL: ${{ secrets.MAINNET_REMOTE_RPC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run state-mate
        run: |
          yarn start ${{ matrix.config }}

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format

  schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate schemas
        run: yarn schemas

      - name: Check if schemas are up to date
        run: |
          if ! git diff --exit-code schemas/; then
            echo "Error: Schema files are not up to date. Please run 'yarn schemas' and commit the changes."
            exit 1
          fi
