# yaml-language-server: $schema=../../../schemas/main-schema.json
# AaveMigrator — strETH (Aave-collateralized) -> earnUSDe subvault migrators on Plasma
# GitHub: https://github.com/mellow-finance/flexible-vaults
#
# Three migrators, all owned by the same Safe and using the same Aave pool/oracle:
# - USDe / USDT0      strETH subvault0 -> earnUSDe subvault0
# - sUSDe / USDT0     strETH subvault0 -> earnUSDe subvault0
# - syrupUSDT / USDT0 strETH subvault1 -> earnUSDe subvault1
deployed:
  l1:
    - &usdeMigrator "0x00000000B984aFe3a14618768662829a78928bbe"
    - &susdeMigrator "0x00000000e8887A95a9bE39de46143c8E58794bE4"
    - &syrupusdtMigrator "0x00000000C7Bf3227130841e959FD73EEDDB16537"
    - &ownerSafe "0x5Dbf9287787A5825beCb0321A276C9c92d570a75"

misc:
  - &ZERO_ADDRESS "0x0000000000000000000000000000000000000000"

  # --- Safe ---
  - &SAFE_IMPL_1_4_1 "0x29fcB43b46531BcA003ddC8FCB67FFE91900C762"
  - &SAFE_THRESHOLD 3
  - &SAFE_OWNER_1 "0x78Eb634731bE1957D370BEcbbD254F427Af5D13b"
  - &SAFE_OWNER_2 "0x5fa3B054D91aF2e1dC76124D7E774044697b942e"
  - &SAFE_OWNER_3 "0xe49384e6Aca6A26c82Eaa161A9211fA60fEee3Ef"
  - &SAFE_OWNER_4 "0x185111c113d9B19Ea4C424D3cD8628A1ee09Be6A"
  - &SAFE_OWNER_5 "0x06C3992a6067bEA8FB3Af7F004EdEbC13656761F"
  - &SAFE_OWNER_6 "0x44A388BBD782AE1D7f4542aEb6C3569E2CfdF5a1"
  - &SAFE_OWNER_7 "0x8888843c607F4Bbd6aD72128F478085256Bdd15D"
  - &SAFE_OWNER_8 "0x1f3E4c3dBF27056CD7881D8eb376B1D7815757a6"

  # --- Aave V3 (Plasma) ---
  - &AAVE_POOL "0x925a2A7214Ed92428B5b1B090F80b25700095e12"
  - &MIGRATOR_ORACLE "0x33E0b3fc976DC9C516926BA48CfC0A9E10a2aAA5"

  # Token addresses are reserves of the official "Aave V3 Plasma Market"
  # (PoolAddressesProvider 0x061D8e131F26512348ee5FA42e2DF1bA9d6505E9), cross-checked
  # against the Aave address-book: https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol

  # --- Debt token (shared): USDT0 ---
  # Aave V3 Plasma USDT0_UNDERLYING — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L103
  - &USDT0 "0xB8CE59FC3717ada4C02eaDF9682A9e934F625ebb"
  # Aave V3 Plasma USDT0_A_TOKEN — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L108
  - &USDT0_ATOKEN "0x5D72a9d9A9510Cd8cBdBA12aC62593A58930a948"
  # Aave V3 Plasma USDT0_V_TOKEN — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L111
  - &USDT0_VARIABLE_DEBT_TOKEN "0xCBBC427b5658672768E11BFDa00879839DB4785F"

  # --- Collateral tokens ---
  # Aave V3 Plasma USDe_UNDERLYING — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L124
  - &USDe "0x5d3a1Ff2b6BAb83b63cd9AD0787074081a52ef34"
  # Aave V3 Plasma USDe_A_TOKEN — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L129
  - &USDe_ATOKEN "0x7519403E12111ff6b710877Fcd821D0c12CAF43A"
  # Aave V3 Plasma sUSDe_UNDERLYING — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L145
  - &sUSDe "0x211Cc4DD073734dA055fbF44a2b4667d5E5fE5d2"
  # Aave V3 Plasma sUSDe_A_TOKEN — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L150
  - &sUSDe_ATOKEN "0xC1A318493fF07a68fE438Cee60a7AD0d0DBa300E"
  # Aave V3 Plasma syrupUSDT_UNDERLYING — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L303
  - &syrupUSDT "0xC4374775489CB9C56003BF2C9b12495fC64F0771"
  # Aave V3 Plasma syrupUSDT_A_TOKEN — https://github.com/bgd-labs/aave-address-book/blob/main/src/AaveV3Plasma.sol#L308
  - &syrupUSDT_ATOKEN "0xD4eE376C40EdC83832aAaFc18fC0272660F5e90b"

  # --- Source subvaults (strETH) — https://docs.mellow.finance/strategy-vault/streth-deployment.md ---
  # "Subvault 0 Plasma"
  - &strETH_subvault0 "0xbbF9400C09B0F649F3156989F1CCb9c016f943bb"
  # "Subvault 1 Plasma"
  - &strETH_subvault1 "0x7696731721dddeC1502F35C52d9c83a768227daE"

  # --- Target subvaults (earnUSDe) — https://metavaults.mellow.finance/deployments.md ---
  # "Subvault 0"
  - &earnUSDe_subvault0 "0xa11BE438F1961dB47F6660BDAF59b05C0200ADC5"
  # "Subvault 1"
  - &earnUSDe_subvault1 "0xbaaE2F02d3a4f33eC164902e5A9E980Cb4c71afB"

  # --- AaveMigrator safety constants ---
  - &UNIT_1E18 1000000000000000000 # 1e18 (18-decimal collateral)
  - &UNIT_1E6 1000000 # 1e6 (6-decimal token)
  - &MAX_ALLOWED_ERROR 1000000 # 1e6
  - &MIN_ALLOWED_MIGRATING_DEBT 10000000000 # 1e10
  - &MIN_ALLOWED_HF_D18 1010000000000000000 # 1.01
  - &MAX_ALLOWED_ITERATIONS 30

l1:
  rpcUrl: PLASMA_RPC_URL
  explorerHostname: api.etherscan.io
  explorerTokenEnv: ETHERSCAN_TOKEN
  chainId: 9745
  contracts:
    usde_migrator:
      name: AaveMigrator
      address: *usdeMigrator
      checks:
        owner: *ownerSafe
        migrated: false
        pool: *AAVE_POOL
        oracle: *MIGRATOR_ORACLE
        collateral: *USDe
        collateralAToken: *USDe_ATOKEN
        collateralUnit: *UNIT_1E18
        debt: *USDT0
        debtAToken: *USDT0_ATOKEN
        debtVariableDebtToken: *USDT0_VARIABLE_DEBT_TOKEN
        debtUnit: *UNIT_1E6
        sourceSubvault: *strETH_subvault0
        targetSubvault: *earnUSDe_subvault0
        maxAllowedError: *MAX_ALLOWED_ERROR
        minAllowedMigratingDebt: *MIN_ALLOWED_MIGRATING_DEBT
        minAllowedSourceHFD18: *MIN_ALLOWED_HF_D18
        minAllowedTargetHFD18: *MIN_ALLOWED_HF_D18
        MAX_ALLOWED_ITERATIONS: *MAX_ALLOWED_ITERATIONS
        calculateSteps: null # needs args
        checkHFAndGetEquity: null # needs args

    susde_migrator:
      name: AaveMigrator
      address: *susdeMigrator
      checks:
        owner: *ownerSafe
        migrated: false
        pool: *AAVE_POOL
        oracle: *MIGRATOR_ORACLE
        collateral: *sUSDe
        collateralAToken: *sUSDe_ATOKEN
        collateralUnit: *UNIT_1E18
        debt: *USDT0
        debtAToken: *USDT0_ATOKEN
        debtVariableDebtToken: *USDT0_VARIABLE_DEBT_TOKEN
        debtUnit: *UNIT_1E6
        sourceSubvault: *strETH_subvault0
        targetSubvault: *earnUSDe_subvault0
        maxAllowedError: *MAX_ALLOWED_ERROR
        minAllowedMigratingDebt: *MIN_ALLOWED_MIGRATING_DEBT
        minAllowedSourceHFD18: *MIN_ALLOWED_HF_D18
        minAllowedTargetHFD18: *MIN_ALLOWED_HF_D18
        MAX_ALLOWED_ITERATIONS: *MAX_ALLOWED_ITERATIONS
        calculateSteps: null # needs args
        checkHFAndGetEquity: null # needs args

    syrupusdt_migrator:
      name: AaveMigrator
      address: *syrupusdtMigrator
      checks:
        owner: *ownerSafe
        migrated: false
        pool: *AAVE_POOL
        oracle: *MIGRATOR_ORACLE
        collateral: *syrupUSDT
        collateralAToken: *syrupUSDT_ATOKEN
        collateralUnit: *UNIT_1E6
        debt: *USDT0
        debtAToken: *USDT0_ATOKEN
        debtVariableDebtToken: *USDT0_VARIABLE_DEBT_TOKEN
        debtUnit: *UNIT_1E6
        sourceSubvault: *strETH_subvault1
        targetSubvault: *earnUSDe_subvault1
        maxAllowedError: *MAX_ALLOWED_ERROR
        minAllowedMigratingDebt: *MIN_ALLOWED_MIGRATING_DEBT
        minAllowedSourceHFD18: *MIN_ALLOWED_HF_D18
        minAllowedTargetHFD18: *MIN_ALLOWED_HF_D18
        MAX_ALLOWED_ITERATIONS: *MAX_ALLOWED_ITERATIONS
        calculateSteps: null # needs args
        checkHFAndGetEquity: null # needs args

    ownerSafe:
      name: SafeL2
      address: *ownerSafe
      proxyName: SafeProxy
      implementation: *SAFE_IMPL_1_4_1
      proxyChecks: {}
      checks:
        VERSION: 1.4.1
        approvedHashes:
        checkNSignatures:
        checkSignatures:
        domainSeparator:
        encodeTransactionData:
        getChainId: 9745
        getModulesPaginated:
        getOwners:
          - *SAFE_OWNER_1
          - *SAFE_OWNER_2
          - *SAFE_OWNER_3
          - *SAFE_OWNER_4
          - *SAFE_OWNER_5
          - *SAFE_OWNER_6
          - *SAFE_OWNER_7
          - *SAFE_OWNER_8
        getStorageAt:
        getThreshold: *SAFE_THRESHOLD
        getTransactionHash:
        isModuleEnabled:
        isOwner:
        nonce:
        signedMessages:
