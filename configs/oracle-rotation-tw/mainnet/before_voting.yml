        MANAGE_FRAME_CONFIG_ROLE: null
        MANAGE_MEMBERS_AND_QUORUM_ROLE: null
        MANAGE_REPORT_PROCESSOR_ROLE: null
        getChainConfig: null
        getConsensusState: null
        getConsensusStateForMember: null
        getCurrentFrame: null
        getFastLaneMembers: null
        getFrameConfig: null
        getInitialRefSlot: null
        getIsFastLaneMember: null
        getIsMember:
          - args: [*oldOracleAddress]
            result: true
          - args: [*newOracleAddress]
            result: false
          - args: [*oldStakefishOracle]
            result: true
          - args: [*newStakefishOracle]
            result: false
        getMembers: null
        getQuorum: null
        getReportProcessor: null
        getReportVariants: null
        getRoleAdmin: null
        getRoleMember: null
        getRoleMemberCount: null
        hasRole: null
        supportsInterface: null

    easyTrack:
      name: EasyTrack
      address: *easyTrack
      checks:
        CANCEL_ROLE: *ET_CANCEL_ROLE
        DEFAULT_ADMIN_ROLE: *ZERO_BYTES32
        MAX_MOTIONS_LIMIT: *EASYTRACK_MAX_MOTIONS_LIMIT
        MAX_OBJECTIONS_THRESHOLD: *EASYTRACK_MAX_OBJECTIONS_THRESHOLD
        MIN_MOTION_DURATION: *EASYTRACK_MIN_MOTION_DURATION
        PAUSE_ROLE: *ET_PAUSE_ROLE
        UNPAUSE_ROLE: *ET_UNPAUSE_ROLE
        canObjectToMotion: null
        evmScriptExecutor: *evmScriptExecutor
        evmScriptFactories: null
        evmScriptFactoryPermissions: null
        getEVMScriptFactories:
