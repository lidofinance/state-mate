        DEFAULT_ADMIN_ROLE: *DEFAULT_ADMIN_ROLE
        RATE_UPDATE_DISABLER_ROLE: *RATE_UPDATE_DISABLER_ROLE
        RATE_UPDATE_ENABLER_ROLE: *RATE_UPDATE_ENABLER_ROLE
