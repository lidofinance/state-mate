  # Lido depositor bot; holds TOP_UP_ROLE on topUpGateway
  # https://research.lido.fi/t/proposal-to-refund-money-spent-on-deposits-on-ethereum-to-the-dev-team/1882
  - &depositorBot "0xF82aC5937A20dC862F9bc0668779031E06000f17"

l1:
  rpcUrl: MAINNET_REMOTE_RPC_URL
  explorerHostname: api.etherscan.io
  explorerTokenEnv: ETHERSCAN_TOKEN
  chainId: "1"
  contracts:
    # Live locator proxy (still delegates to the old impl), replaced by the vote
    lidoLocator:
      name: LidoLocator
      address: *lidoLocator
      proxyName: OssifiableProxy
      implementation: *lidoLocatorImplOld
      proxyChecks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *lidoLocatorImplOld
        proxy__getIsOssified: false
      storage:
        - slot: *EIP1967_ADMIN_SLOT
          expected: *agent
          label: admin
        - slot: *EIP1967_IMPLEMENTATION_SLOT
          expected: *lidoLocatorImplOld
          label: implementation
      checks:
        accounting: *accounting
        accountingOracle: *accountingOracle
        burner: *burner
        coreComponents:
          [*elRewardsVault, *oracleReportSanityCheckerOld, *stakingRouter, *agent, *withdrawalQueue, *withdrawalVault]
        depositSecurityModule: *depositSecurityModuleOld
        elRewardsVault: *elRewardsVault
        lazyOracle: *lazyOracle
        lido: *lido
        operatorGrid: *operatorGrid
        oracleDaemonConfig: *oracleDaemonConfig
        oracleReportComponents:
          [
            *accountingOracle,
            *oracleReportSanityCheckerOld,
            *burner,
            *withdrawalQueue,
            *postTokenRebaseReceiver,
            *stakingRouter,
            *vaultHub,
          ]
        oracleReportSanityChecker: *oracleReportSanityCheckerOld
        postTokenRebaseReceiver: *postTokenRebaseReceiver
        predepositGuarantee: *predepositGuarantee
        stakingRouter: *stakingRouter
        treasury: *agent
        triggerableWithdrawalsGateway: *triggerableWithdrawalsGateway
        validatorExitDelayVerifier: *validatorExitDelayVerifier
        validatorsExitBusOracle: *validatorsExitBusOracle
        vaultFactory: *vaultFactory
        vaultHub: *vaultHub
        withdrawalQueue: *withdrawalQueue
        withdrawalVault: *withdrawalVault
        wstETH: *wstETH

    # New implementations deployed by SRv3, not yet wired in
    lidoLocatorImpl:
      name: LidoLocator
      address: *lidoLocatorImpl
      checks:
        accounting: *accounting
        accountingOracle: *accountingOracle
        burner: *burner
        consolidationGateway: *consolidationGateway
        coreComponents:
          [*elRewardsVault, *oracleReportSanityChecker, *stakingRouter, *agent, *withdrawalQueue, *withdrawalVault]
        depositSecurityModule: *depositSecurityModule
        elRewardsVault: *elRewardsVault
        lazyOracle: *lazyOracle
        lido: *lido
        operatorGrid: *operatorGrid
        oracleDaemonConfig: *oracleDaemonConfig
        oracleReportComponents:
          [
            *accountingOracle,
            *oracleReportSanityChecker,
            *burner,
            *withdrawalQueue,
            *postTokenRebaseReceiver,
            *stakingRouter,
            *vaultHub,
          ]
        oracleReportSanityChecker: *oracleReportSanityChecker
        postTokenRebaseReceiver: *postTokenRebaseReceiver
        predepositGuarantee: *predepositGuarantee
        stakingRouter: *stakingRouter
        topUpGateway: *topUpGateway
        treasury: *agent
        triggerableWithdrawalsGateway: *triggerableWithdrawalsGateway
        validatorExitDelayVerifier: *validatorExitDelayVerifier
        validatorsExitBusOracle: *validatorsExitBusOracle
        vaultFactory: *vaultFactory
        vaultHub: *vaultHub
        withdrawalQueue: *withdrawalQueue
        withdrawalVault: *withdrawalVault
        wstETH: *wstETH

    # New implementations deployed by SRv3, not yet wired in
    lidoImpl:
      name: Lido
      address: *lidoImpl
      checks:
        getPooledEthBySharesRoundUp:
          - args: [0]
            result: 0
