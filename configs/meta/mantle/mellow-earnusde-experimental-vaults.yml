l1:
  rpcUrl: MANTLE_RPC_URL
  explorerHostname: api.etherscan.io/v2/api
  explorerTokenEnv: ETHERSCAN_TOKEN
  chainId: 5000
  contracts:
    # =============================================
    # === earnUSDe (Experimental) - Mantle ===
    # =============================================

    # --- ProxyAdmin Contracts ---

    earnUSDe_vaultProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_vaultProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_subvault0ProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_subvault0ProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_verifier0ProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_verifier0ProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_swapModule0ProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_swapModule0ProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_oracleProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_oracleProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_shareManagerProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_shareManagerProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_feeManagerProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_feeManagerProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_riskManagerProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_riskManagerProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    # --- earnUSDe Vault ---

    earnUSDe_vault:
      name: Vault
      address: *earnUSDe_vault
      proxyName: TransparentUpgradeableProxy
      implementation: *vaultImplementation
      proxyChecks: {}
      storage:
        - slot: *EIP1967_ADMIN_SLOT
          expected: *earnUSDe_vaultProxyAdmin
          label: admin
        - slot: *EIP1967_IMPLEMENTATION_SLOT
          expected: *vaultImplementation
          label: implementation
      checks:
        CREATE_QUEUE_ROLE: *CREATE_QUEUE_ROLE
        CREATE_SUBVAULT_ROLE: *CREATE_SUBVAULT_ROLE
        DEFAULT_ADMIN_ROLE: *DEFAULT_ADMIN_ROLE
        DISCONNECT_SUBVAULT_ROLE: *DISCONNECT_SUBVAULT_ROLE
        PULL_LIQUIDITY_ROLE: *PULL_LIQUIDITY_ROLE
        PUSH_LIQUIDITY_ROLE: *PUSH_LIQUIDITY_ROLE
        RECONNECT_SUBVAULT_ROLE: *RECONNECT_SUBVAULT_ROLE
        REMOVE_QUEUE_ROLE: *REMOVE_QUEUE_ROLE
        SET_HOOK_ROLE: *SET_HOOK_ROLE
        SET_QUEUE_LIMIT_ROLE: *SET_QUEUE_LIMIT_ROLE
        SET_QUEUE_STATUS_ROLE: *SET_QUEUE_STATUS_ROLE
        assetAt:
        claimableSharesOf:
        defaultDepositHook: *ZERO_ADDRESS
        defaultRedeemHook: *ZERO_ADDRESS
        depositQueueFactory: *depositQueueFactory
        feeManager: *earnUSDe_feeManager
        getAssetCount: 0
        getHook:
        getQueueCount: 0
        getLiquidAssets:
        getRoleAdmin:
        getRoleMember:
        getRoleMemberCount:
        getRoleMembers:
        getStorageAt:
        hasAsset:
        hasQueue:
        hasRole:
        hasSubvault:
          - args: [*earnUSDe_subvault0]
            result: true
        hasSupportedRole:
        isDepositQueue:
        isPausedQueue:
        onERC721Received:
        oracle: *earnUSDe_oracle
        queueAt:
        queueLimit: 0
        redeemQueueFactory: *redeemQueueFactory
        riskManager: *earnUSDe_riskManager
        shareManager: *earnUSDe_shareManager
        subvaultAt:
          - args: [0]
            result: *earnUSDe_subvault0
          - args: [1]
            mustRevert: true
        subvaultFactory: *subvaultFactory
        subvaults: 1
        supportedRoleAt:
          - args: [2]
            result: *SET_MERKLE_ROOT_ROLE
          - args: [1]
            result: *CALLER_ROLE
          - args: [0]
            result: *DEFAULT_ADMIN_ROLE
          - args: [3]
            mustRevert: true
        supportedRoles: 3
        supportsInterface:
        verifierFactory: *verifierFactory
      implementationChecks:
        CREATE_QUEUE_ROLE: *CREATE_QUEUE_ROLE
        CREATE_SUBVAULT_ROLE: *CREATE_SUBVAULT_ROLE
        DEFAULT_ADMIN_ROLE: *DEFAULT_ADMIN_ROLE
        DISCONNECT_SUBVAULT_ROLE: *DISCONNECT_SUBVAULT_ROLE
        PULL_LIQUIDITY_ROLE: *PULL_LIQUIDITY_ROLE
        PUSH_LIQUIDITY_ROLE: *PUSH_LIQUIDITY_ROLE
