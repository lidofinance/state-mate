        redeemQueueFactory: *redeemQueueFactory
        riskManager: *ZERO_ADDRESS
        shareManager: *ZERO_ADDRESS
        subvaultAt:
        subvaultFactory: *subvaultFactory
        subvaults: 0
        supportedRoleAt:
        supportedRoles: 0
        supportsInterface:
        verifierFactory: *verifierFactory
      ozAcl:
        *DEFAULT_ADMIN_ROLE : [*lazyVaultAdmin]
        *CALLER_ROLE : [*curator]
        *SET_MERKLE_ROOT_ROLE : [*earnUSDe_timelockController, *mellow_deployer]

    earnUSDe_subvault0:
      name: Subvault
      address: *earnUSDe_subvault0
