      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_feeManagerProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_feeManagerProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    earnUSDe_riskManagerProxyAdmin:
      name: ProxyAdmin
      address: *earnUSDe_riskManagerProxyAdmin
      checks:
        UPGRADE_INTERFACE_VERSION: "5.0.0"
        owner: *proxyAdmin

    # --- earnUSDe Vault ---

    earnUSDe_vault:
      name: Vault
      address: *earnUSDe_vault
      proxyName: TransparentUpgradeableProxy
      implementation: *vaultImplementation
      proxyChecks: {}
      storage:
        - slot: *EIP1967_ADMIN_SLOT
