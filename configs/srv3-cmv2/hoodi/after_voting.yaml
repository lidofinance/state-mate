l1:
  rpcUrl: HOODI_REMOTE_RPC_URL
  explorerHostname: api-hoodi.etherscan.io
  explorerTokenEnv: ETHERSCAN_TOKEN
  chainId: *CHAIN_ID
  contracts:
    lidoLocatorProxy:
      name: OssifiableProxyState
      address: *lidoLocator
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *lidoLocatorImpl
        proxy__getIsOssified: false

    stakingRouterProxy:
      name: OssifiableProxyState
      address: *stakingRouter
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *stakingRouterImpl
        proxy__getIsOssified: false

    stakingRouter:
      name: StakingRouterState
      address: *stakingRouter
      checks:
        getContractVersion: 4
        getStakingModulesCount: *CURATED_MODULES_COUNT
        getStakingModule:
          - args: [*CURATED_MODULE_ID]
            result:
              id: *CURATED_MODULE_ID
              stakingModuleAddress: *curatedModule
              stakingModuleFee: *CURATED_STAKING_MODULE_FEE
              treasuryFee: *CURATED_TREASURY_FEE
              stakeShareLimit: *CURATED_STAKE_SHARE_LIMIT
              status: *CURATED_MODULE_STATUS
              name: *CURATED_MODULE_NAME
              lastDepositAt: null
              lastDepositBlock: null
              exitedValidatorsCount: *CURATED_EXITED_VALIDATORS_COUNT
              priorityExitShareThreshold: *CURATED_PRIORITY_EXIT_SHARE_THRESHOLD
              maxDepositsPerBlock: *CURATED_MAX_DEPOSITS_PER_BLOCK
              minDepositBlockDistance: *CURATED_MIN_DEPOSIT_BLOCK_DISTANCE
              withdrawalCredentialsType: *CURATED_WITHDRAWAL_CREDENTIALS_TYPE
              validatorsBalanceGwei: *CURATED_VALIDATORS_BALANCE_GWEI
        hasRole:
          - args: [*DEFAULT_ADMIN_ROLE, *agent]
            result: true
          - args: [*STAKING_MODULE_MANAGE_ROLE, *agent]
            result: true
          - args: [*STAKING_MODULE_MANAGE_ROLE, *hoodiLegacyStakingModuleManager]
            result: true
          - args: [*STAKING_MODULE_SHARE_MANAGE_ROLE, *easyTrackEvmScriptExecutor]
            result: true
          - args: [*STAKING_MODULE_UNVETTING_ROLE, *oldDepositSecurityModule]
            result: false
          - args: [*STAKING_MODULE_UNVETTING_ROLE, *newDepositSecurityModule]
            result: true
          - args: [*REPORT_EXITED_VALIDATORS_ROLE, *accountingOracle]
            result: true
          - args: [*REPORT_VALIDATOR_EXITING_STATUS_ROLE, *validatorExitDelayVerifier]
            result: true
          - args: [*REPORT_VALIDATOR_EXIT_TRIGGERED_ROLE, *triggerableWithdrawalsGateway]
            result: true
          - args: [*REPORT_REWARDS_MINTED_ROLE, *accounting]
            result: true

    accountingOracleProxy:
      name: OssifiableProxyState
      address: *accountingOracle
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *accountingOracleImpl
        proxy__getIsOssified: false

    accountingOracle:
      name: AccountingOracleState
      address: *accountingOracle
      checks:
        getContractVersion: 5
        getConsensusVersion: 6

    validatorsExitBusOracleProxy:
      name: OssifiableProxyState
      address: *validatorsExitBusOracle
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *validatorsExitBusOracleImpl
        proxy__getIsOssified: false

    validatorsExitBusOracle:
      name: ValidatorsExitBusOracleState
      address: *validatorsExitBusOracle
      checks:
        getContractVersion: 3
        getConsensusVersion: 5
        getExitRequestLimitFullInfo:
          [
            *VEBO_MAX_EXIT_BALANCE_ETH,
            *VEBO_BALANCE_PER_FRAME_ETH,
            *VEBO_FRAME_DURATION_IN_SEC,
            *VEBO_MAX_EXIT_BALANCE_ETH,
            *VEBO_MAX_EXIT_BALANCE_ETH,
          ]
        getMaxValidatorsPerReport: *VEBO_MAX_VALIDATORS_PER_REPORT

    accountingProxy:
      name: OssifiableProxyState
      address: *accounting
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *accountingImpl
        proxy__getIsOssified: false

    withdrawalVaultProxy:
      name: WithdrawalVaultProxyState
      address: *withdrawalVault
      checks:
        implementation: *withdrawalVaultImpl
        proxy_getAdmin: *agent
        proxy_getIsOssified: false

    withdrawalVault:
      name: WithdrawalVaultState
      address: *withdrawalVault
      checks:
        getContractVersion: 3

    lido:
      name: LidoAppState
      address: *lido
      checks:
        implementation: *lidoImpl
        getContractVersion: 4

    aragonKernel:
      name: KernelState
      address: *aragonKernel
      checks:
        getApp:
          - args: [*KERNEL_APP_BASES_NAMESPACE, *LIDO_APP_ID]
            result: *lidoImpl

    aragonAcl:
      name: ACLState
      address: *acl
      checks:
        hasPermission:
          - args: [*agent, *aragonKernel, *APP_MANAGER_ROLE]
            result: false
          - args: [*agent, *lido, *BUFFER_RESERVE_MANAGER_ROLE]
            result: true
        getPermissionManager:
          - args: [*lido, *BUFFER_RESERVE_MANAGER_ROLE]
            result: *agent

    triggerableWithdrawalsGateway:
      name: TriggerableWithdrawalsGatewayState
      address: *triggerableWithdrawalsGateway
      checks:
        getExitRequestLimitFullInfo:
          maxExitRequestsLimit: *TW_MAX_EXIT_REQUESTS_LIMIT
          exitsPerFrame: *TW_EXITS_PER_FRAME
          frameDurationInSec: *TW_FRAME_DURATION_IN_SEC
          prevExitRequestsLimit: *TW_MAX_EXIT_REQUESTS_LIMIT
          currentExitRequestsLimit: *TW_MAX_EXIT_REQUESTS_LIMIT
        hasRole:
          - args: [*TW_EXIT_LIMIT_MANAGER_ROLE, *agent]
            result: true
          - args: [*ADD_FULL_WITHDRAWAL_REQUEST_ROLE, *oldCsmEjector]
            result: false
          - args: [*ADD_FULL_WITHDRAWAL_REQUEST_ROLE, *csmEjector]
            result: true
          - args: [*ADD_FULL_WITHDRAWAL_REQUEST_ROLE, *curatedEjector]
            result: true

    csmProxy:
      name: OssifiableProxyState
      address: *csm
      checks:
        proxy__getAdmin: *agent
        proxy__getImplementation: *csmImpl
        proxy__getIsOssified: false

    csm:
      name: CSModuleState
      address: *csm
      checks:
        getInitializedVersion: 3
        hasRole:
          - args: [*REPORT_EL_REWARDS_STEALING_PENALTY_ROLE, *csmCommittee]
            result: false
          - args: [*REPORT_GENERAL_DELAYED_PENALTY_ROLE, *csmCommittee]
            result: true
          - args: [*SETTLE_EL_REWARDS_STEALING_PENALTY_ROLE, *easyTrackEvmScriptExecutor]
            result: false
          - args: [*SETTLE_GENERAL_DELAYED_PENALTY_ROLE, *easyTrackEvmScriptExecutor]
