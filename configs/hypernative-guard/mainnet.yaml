        getPolicyExtensions: []
        DOMAIN_SEPARATOR: "0xd321138f2bf9cc808e81c9d2c087d27eb4233d30218d0c158b0fabd18127597f"
        revokingHash: "0xba58570ed36e97c0e8a8b1124999ab4eac5c4b7409a3d83b7d35cce9882fd2c1"
