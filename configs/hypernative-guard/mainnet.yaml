        getPolicyExtensions: []
        DOMAIN_SEPARATOR: "0x9d104fb5e22968c1078635bdfc91ca20a9c3ebdb762ee4f4eff428b6e92f36a5"
        revokingHash: "0x99f2e5fb11d244218872e48cbf4714d9c7776961457947a6366c8a62f63ab82d"
        enablePassThroughModeHash: "0x641fafee863cdd9c722e4066553e7684ffe235165d303e5cf9c1d135fc36822b"
        activateRevokeTimelockHash: &allianceActivateRevokeTimelockHash "0xb58278ac4de6c7c2558f7d30f4743e805ba8aa263e5c826b920645e6038348cb"
        disableRevokeTimelockHash: &allianceDisableRevokeTimelockHash "0x9d83daa38068b2300ff34afb07f22461f9875f24afae0ca9beaf537be19752e5"
        approvedNonceFreeTxHashes:
