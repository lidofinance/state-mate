          - args: [*ecoDisableRevokeTimelockHash]
            result: true
        approvedTxHashes: null
        approvedFunctionCallHashes: null
        getRoleAdmin:
          - args: [*DEFAULT_ADMIN_ROLE]
            result: *DEFAULT_ADMIN_ROLE
          - args: [*KEEPER_ROLE]
            result: *DEFAULT_ADMIN_ROLE
        getRoleMembers:
          - args: [*DEFAULT_ADMIN_ROLE]
            result: []
          - args: [*KEEPER_ROLE]
            result: [*hypernativeKeeper]
        getRoleMember: null
        getRoleMemberCount: null
        hasRole: null
        supportsInterface:
          - args: ["0x01ffc9a7"] # ERC-165 (IERC165)
            result: true
          - args: ["0x7965db0b"] # IAccessControl
            result: true
          - args: ["0x5a05180f"] # IAccessControlEnumerable
            result: true
          - args: ["0xe6d7a83a"] # ITransactionGuard (Safe transaction guard)
            result: true
          - args: ["0xffffffff"] # must be false per ERC-165
            result: false
        checkTransaction: null
        getFunctionCallHash: null
        getNonceFreeTransactionHash: null
        getPrivilegedOperationHash: null
      ozAcl:
        *DEFAULT_ADMIN_ROLE : []
        *KEEPER_ROLE : [*hypernativeKeeper]

    # ---------------------------------------------------------------------------
