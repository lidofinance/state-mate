    # Lido Labs MS (Safe v1.4.1)
    # ---------------------------------------------------------------------------
    lidoLabsSafe:
      name: Safe
      proxyName: SafeProxy
      address: *lidoLabsSafe
      implementation: *safeSingleton_1_4_1
      proxyChecks: {}
      storage:
        - slot: *SAFE_SINGLETON_SLOT
          expected: *safeSingleton_1_4_1
          label: singleton
        # TARGET: guard wired via setGuard(); slot is 0 until executed → RED until then
        - slot: *SAFE_GUARD_SLOT
          expected: *lidoLabsGuard
          label: guard
      checks:
        VERSION: "1.4.1"
        getChainId: 1
        getThreshold: 5
        domainSeparator: *lidoLabsDomainSeparator
        getOwners:
          - "0xB95fdA03A90290Bd5853C79796a768E37130d193"
          - "0xf15f39f29b2C57Ab77745E73FD92f33aDA024791"
          - "0x81ca68f085282434D15c09619360D6513710a979"
