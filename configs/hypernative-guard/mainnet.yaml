        approvedHashes: null
        checkNSignatures: null
        checkSignatures: null
        encodeTransactionData: null
        getStorageAt: null
        getTransactionHash: null
        isModuleEnabled: null
        isOwner: null
        nonce: null # transient, increases with each executed tx
        signedMessages: null

