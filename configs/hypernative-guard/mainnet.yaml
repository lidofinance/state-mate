          - "0x000000DfE832ccD7a4011a1Fca34602C9a598353"
          - "0xcb408B2c5e45E43DF0F3B2d665873F805D435598"
          - "0x30cE91EB74E56d0df97c78774B3ACa2144F6AD32"
          - "0x992Ce4eEc8288274f60880c7770DdA265fCCe610"
          - "0xB8Dcad009E533066F12e408075E10E3a30F1f15A"
        # invariant #4: no modules enabled — returns ([], SENTINEL_MODULES)
