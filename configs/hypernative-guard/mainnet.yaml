        revokingHash: "0xa6372e6b81cf2dcd8adc2a6a48277e28477d333a7d23380b745c740bd8c5cbd5"
        enablePassThroughModeHash: "0xf0dcbecf84bcc1853cd2c26d39f2a77c795fcbd10a94a67dd478f31ae3acfe4b"
        activateRevokeTimelockHash: &ecoActivateRevokeTimelockHash "0x149e69286e5d32772cce1c6f5555e38654f79135598bd9c62b5581118c4604db"
        disableRevokeTimelockHash: &ecoDisableRevokeTimelockHash "0x0be6c7918fa88468bf277334cff0190a549b7401bc49e42ba82474b73598f268"
        approvedNonceFreeTxHashes:
          - args: [*ecoActivateRevokeTimelockHash]
